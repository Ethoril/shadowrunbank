name: Tests

# Les push sur main sont testés puis déployés par deploy-pages.yml ; ici on ne
# garde que la validation des pull requests pour éviter de lancer la suite deux fois.
on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - name: Installer les dépendances
        run: pnpm install --frozen-lockfile
      - name: Installer Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Tests unitaires et intégration
        run: pnpm test
      - name: Vérifier l’artefact statique
        run: pnpm build
